services:
  # ── GPU monitor + agent ────────────────────────────────────────────────────
  gpufl-monitor:
    image: gpufl/monitor:latest
    build:
      context: .
      dockerfile: Dockerfile.monitor
    runtime: nvidia
    environment:
      # C++ daemon config
      GPUFL_MONITOR_APP: ${GPUFL_MONITOR_APP:-gpufl-monitor}
      GPUFL_MONITOR_LOG_DIR: ${GPUFL_MONITOR_LOG_DIR:-/var/gpufl/monitor/session}
      GPUFL_MONITOR_INTERVAL_MS: ${GPUFL_MONITOR_INTERVAL_MS:-5000}

      # Java agent - source folders (auto-discovers all log prefixes)
      GPUFL_SOURCE_FOLDERS: ${GPUFL_SOURCE_FOLDERS:-/var/gpufl/monitor/session}
      GPUFL_LOG_TYPES: ${GPUFL_LOG_TYPES:-system}
      GPUFL_CURSOR_FILE: ${GPUFL_CURSOR_FILE:-/var/gpufl/monitor/cursor.json}

      # Java agent - publisher (HTTP). Set GPUFL_HTTP_HOST to just the
      # scheme+host (e.g. https://api.gpuflight.com); the agent builds
      # the /api/{version}/events/<type> path itself. Override the
      # version via GPUFL_HTTP_API_VERSION when the backend bumps to v2.
      GPUFL_PUBLISHER_TYPE: ${GPUFL_PUBLISHER_TYPE:-http}
      GPUFL_HTTP_HOST: ${GPUFL_HTTP_HOST}
      GPUFL_HTTP_API_VERSION: ${GPUFL_HTTP_API_VERSION:-v1}
      GPUFL_HTTP_TOKEN: ${GPUFL_HTTP_TOKEN:-}
      GPUFL_HTTP_TIMEOUT_SEC: ${GPUFL_HTTP_TIMEOUT_SEC:-10}

      # Java agent - publisher (Kafka, optional)
      GPUFL_KAFKA_BROKERS: ${GPUFL_KAFKA_BROKERS:-}
      GPUFL_KAFKA_TOPIC_PREFIX: ${GPUFL_KAFKA_TOPIC_PREFIX:-gpu-trace}
      GPUFL_KAFKA_COMPRESSION: ${GPUFL_KAFKA_COMPRESSION:-snappy}
      GPUFL_KAFKA_LINGER_MS: ${GPUFL_KAFKA_LINGER_MS:-100}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - gpufl-cursor:/var/gpufl/monitor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  gpufl-cursor:
  gpufl-demo-logs:
